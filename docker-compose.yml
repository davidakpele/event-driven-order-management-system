services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blast-assessment-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - blast-assessment-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: blast-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    restart: unless-stopped
    networks:
      - blast-assessment-network

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: blast_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blast-assessment-network

  mongo-express:
    image: mongo-express:1.0.2
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    restart: unless-stopped
    networks:
      - blast-assessment-network

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m services.api_gateway.main
    ports:
      - "8292:8292"
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: blast_db
      APP_ENV: development
      SERVICE_NAME: api-gateway
      LOG_LEVEL: INFO
      RATE_LIMIT_PER_MINUTE: 100
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - blast-assessment-network

  payment-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m services.payment_service.main
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: blast_db
      SERVICE_NAME: payment-service
      LOG_LEVEL: INFO
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - blast-assessment-network

  notification-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m services.notification_service.main
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: blast_db
      SERVICE_NAME: notification-service
      LOG_LEVEL: INFO
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - blast-assessment-network

  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:uid=101,gid=101,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    ports:
      - "8000:8000"
    volumes:
      - ./security-firewalls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./security-firewalls/conf.d:/etc/nginx/conf.d:ro
      - ./security-firewalls/html:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx:rw
      - nginx_cache:/var/cache/nginx:rw
      - nginx_run:/var/run:rw
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - TZ=UTC
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    networks:
      - blast-assessment-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=nginx"

volumes:
  mongo_data:
  nginx_logs:
  nginx_cache:
  nginx_run:

networks:
  blast-assessment-network:
    driver: bridge